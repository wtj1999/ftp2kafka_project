# docker-compose.yml
version: "3.8"

services:
  app:
    build:
      context: .
      network: host
    image: ftp2kafka_app:latest
    container_name: ftp2kafka_app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env            # 从项目根读取 .env
    volumes:
      - /data/ftp2kafka_jz2_pack/catboost_models:/app/catboost_models
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    extra_hosts:
      - "jzpack01:10.0.50.20"
      - "jzpack02:10.0.50.21"
      - "jzpack03:10.0.50.22"
    # 如果需要 healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
